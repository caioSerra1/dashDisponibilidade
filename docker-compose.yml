services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dash
      POSTGRES_PASSWORD: dash
      POSTGRES_DB: dash
    ports:
      - "5432:5432"
    volumes:
      - dash_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dash -d dash"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dash:dash@postgres:5432/dash?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me-32-chars-min-xx}
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret-change-me-32-chars}
      CLICKUP_API_TOKEN: ${CLICKUP_API_TOKEN:-}
      CLICKUP_TEAM_ID: ${CLICKUP_TEAM_ID:-}
      ZABBIX_URL: ${ZABBIX_URL:-}
      ZABBIX_USER: ${ZABBIX_USER:-}
      ZABBIX_PASSWORD: ${ZABBIX_PASSWORD:-}
    ports:
      - "3000:3000"
    volumes:
      - dash_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dash_pg:
  dash_uploads:
